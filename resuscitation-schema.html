<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="שאלות חובשים">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאלות חובשים - סכמת X-CARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .dark .loader {
            border: 4px solid #334155;
            border-top: 4px solid #60a5fa;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        body {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 26%),
                radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.16), transparent 24%),
                linear-gradient(135deg, #f8fbff 0%, #eff6ff 46%, #f8fafc 100%);
        }

        .dark body {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 26%),
                radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.12), transparent 24%),
                linear-gradient(135deg, #020617 0%, #0f172a 46%, #111827 100%);
        }

        .step-tab.active-tab {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .test-input {
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .test-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .test-input.correct {
            border-color: #22c55e !important;
            background-color: rgba(34, 197, 94, 0.08) !important;
        }

        .test-input.wrong {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.08) !important;
        }
    </style>
</head>

<body class="text-slate-800 dark:text-slate-100 h-dvh flex flex-col transition-colors duration-300 overflow-hidden">

    <!-- Global Loader -->

                <!-- American Quiz -->

        <!-- SCREEN: QUIZ -->

                </div>

                    <div

        <!-- SCREEN: FULL SCHEMA REFERENCE -->
        <div id="screen-full-schema" class="screen flex-col w-full flex-1 overflow-hidden">

                <div class="max-w-3xl mx-auto">
                    <div class="flex items-center justify-between mb-6">

                    <div id="full-schema-content" class="space-y-4"></div>

    </main>

    <script type="module">
        import { ensureInitialAuth, onUserChanged, signOutUser, isAuthorizedUser } from "./firebase-common.js";

        let currentUser = null;
        const currentAxis = 'resuscitation-schema';

        // ====== SCHEMA DATA ======
        const schemaSteps = [
            {
                id: 'X', letter: 'X', fullName: 'eXtract', hebrewName: 'חילוץ', time: '30 שניות',
                icon: 'shield-alert',
                gradient: 'from-red-600 to-rose-500', lightBg: 'bg-red-50 dark:bg-red-900/20',
                textColor: 'text-red-600 dark:text-red-400', borderColor: 'border-red-200 dark:border-red-800',
                ringColor: 'ring-red-400', tabBg: 'bg-red-600', tabText: 'text-white',
                note: 'הפעולות עצמן יבוצעו על ידי חובשים בלבד בשלב זה',
                items: [
                    'ביצוע תרגולת חלץ-טפל או טכניקה קרבית פצוע בכוח',
                    'הכרזה בשטח ובקשר על פצוע בכוח',
                    'השגת עליונות באש',
                    'הגעה למחסה ראשוני ע״י חילוץ עצמי או על ידי כוח שהוגדר לכך',
                    'עצירת דימום פורץ עצמאית או ע״י לוחם/מטפל סמוך'
                ]
            },
            {

        // ====== UTILITY FUNCTIONS ======
        function normalizeForCompare(text) {
            return text
                .replace(/[,.\-–:;!?'"״׳()\[\]{}<>←→«»\/\\]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function compareTexts(expected, actual) {
            const expNorm = normalizeForCompare(expected);
            const actNorm = normalizeForCompare(actual);
            return expNorm === actNorm;
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

                let inputsHtml = step.items.map((_, idx) => `

                html += `
                    <div class="mb-6 rounded-[2rem] overflow-hidden shadow-lg border ${step.borderColor}">

            });

            html += `
                <div id="ft-result" class="hidden mb-6 p-6 rounded-[2rem] shadow-xl border text-center"></div>
                <div class="flex gap-3 mb-10">
                    <button id="ft-check-btn" onclick="checkFullTest()" class="flex-1 bg-slate-900 dark:bg-blue-600 text-white font-black text-xl py-4 rounded-2xl shadow-lg hover:bg-slate-800 dark:hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> בדוק מבחן
                    </button>
                    <button onclick="initFullTest()" class="bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold px-6 py-4 rounded-2xl border border-slate-300 dark:border-slate-600 hover:bg-slate-50 transition">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            `;

            container.innerHTML = html;
            lucide.createIcons();
        }

        window.checkFullTest = () => {
            if (fullTestChecked) return;
            fullTestChecked = true;

            let totalItems = 0;
            let correctItems = 0;
            let wrongDetails = [];

            schemaSteps.forEach(step => {
                step.items.forEach((expected, idx) => {
                    totalItems++;
                    const input = document.getElementById(`ft-${step.id}-${idx}`);
                    const feedback = document.getElementById(`ft-fb-${step.id}-${idx}`);
                    const userText = input.value.trim();

                    if (compareTexts(expected, userText)) {
                        correctItems++;
                        input.classList.add('correct');
                        feedback.classList.remove('hidden');
                        feedback.className = 'mt-1 text-sm font-bold px-2 text-green-600 dark:text-green-400';
                        feedback.innerHTML = '✓ נכון!';
                    } else {
                        input.classList.add('wrong');
                        input.readOnly = true;
                        feedback.classList.remove('hidden');
                        feedback.className = 'mt-1 text-sm font-bold px-2 text-red-500 dark:text-red-400';
                        feedback.innerHTML = `✗ צריך להיות: <span class="text-slate-700 dark:text-slate-300">${expected}</span>`;
                        wrongDetails.push({ step: step.letter, idx: idx + 1, expected, got: userText });
                    }
                });
            });

            const score = Math.round((correctItems / totalItems) * 100);
            const resultDiv = document.getElementById('ft-result');
            resultDiv.classList.remove('hidden');

            let color = 'text-green-600';
            let bgColor = 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800';
            let msg = 'מדהים! שליטה מלאה בסכמה!';
            if (score < 100) { msg = 'כמעט מושלם! חזור על הנקודות החסרות.'; }
            if (score < 80) { msg = 'טוב, אבל יש מה לשפר.'; color = 'text-orange-500'; bgColor = 'bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800'; }
            if (score < 60) { msg = 'מומלץ לחזור על הסכמה בכרטיסיות.'; color = 'text-red-500'; bgColor = 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'; }

            resultDiv.className = `mb-6 p-6 rounded-[2rem] shadow-xl border text-center ${bgColor}`;
            resultDiv.innerHTML = `
                <div class="text-5xl font-black ${color} mb-2">${score}%</div>
                <div class="text-lg font-bold text-slate-700 dark:text-slate-300 mb-1">${correctItems} מתוך ${totalItems} נקודות נכונות</div>
                <p class="text-slate-500 dark:text-slate-400 font-medium">${msg}</p>
            `;

            document.getElementById('ft-check-btn').className = 'flex-1 bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-500 font-black text-xl py-4 rounded-2xl cursor-not-allowed flex items-center justify-center gap-2';

            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        // ====== FULL SCHEMA REFERENCE ======
        function initFullSchema() {
            const container = document.getElementById('full-schema-content');
            if (container.dataset.rendered) return; // already rendered
            container.dataset.rendered = '1';
            container.innerHTML = schemaSteps.map(step => `
                <div class="rounded-2xl border-2 overflow-hidden shadow-sm" style="border-color: var(--step-color, #e2e8f0)">
                    <div class="bg-gradient-to-l ${step.gradient} px-4 py-3 flex items-center gap-3">
                        <div class="shrink-0 w-10 h-10 rounded-xl bg-white/25 flex items-center justify-center">
                            <i data-lucide="${step.icon}" class="w-5 h-5 text-white"></i>
                        </div>
                        <div class="flex-1 text-right">
                            <div class="text-lg font-black text-white leading-tight">${step.letter} — ${step.hebrewName}</div>
                            <div class="text-xs font-semibold text-white/75">${step.fullName}${step.time ? ' · ' + step.time : ''}</div>
                        </div>
                    </div>
                    ${step.note ? `<div class="bg-amber-50 dark:bg-amber-900/20 border-b border-amber-200 dark:border-amber-800 px-4 py-2 text-xs font-bold text-amber-700 dark:text-amber-300 text-right flex items-center gap-1.5"><span>⚠️</span> ${step.note}</div>` : ''}
                    <div class="bg-white dark:bg-slate-800 px-4 py-3">
                        <ol class="space-y-1.5">
                            ${step.items.map((item, i) => `
                                <li class="flex items-start gap-2.5 text-sm text-slate-700 dark:text-slate-300 text-right">
                                    <span class="shrink-0 mt-0.5 w-5 h-5 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-xs font-black text-slate-500 dark:text-slate-400">${i + 1}</span>
                                    <span class="leading-relaxed">${item}</span>
                                </li>
                            `).join('')}
                        </ol>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // ====== STEP TEST ======
        let stepTestStep = null;
        let stepTestChecked = false;

        function initStepTest() {
            stepTestStep = null;
            stepTestChecked = false;
            renderStepTestSelection();
        }

        function renderStepTestSelection() {
            const container = document.getElementById('step-test-inner');
            let html = `
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-2">מבחן לפי שלבים</h2>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">בחר שלב ספציפי ורשום את כל הנקודות שלו מילה במילה.</p>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            `;

            schemaSteps.forEach(step => {
                html += `
                    <button onclick="selectStepTest('${step.id}')" class="group p-5 rounded-[2rem] bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-transparent shadow-sm hover:shadow-xl transition-all duration-300 text-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br ${step.gradient} opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="relative z-10">
                            <div class="w-14 h-14 mx-auto bg-gradient-to-br ${step.gradient} text-white rounded-2xl flex items-center justify-center mb-3 text-2xl font-black group-hover:bg-white/20 transition">${step.letter}</div>
                            <div class="font-black text-slate-800 dark:text-white group-hover:text-white transition">${step.hebrewName}</div>
                            <div class="text-xs font-bold text-slate-400 group-hover:text-white/80 transition mt-1">${step.items.length} נקודות</div>
                        </div>
                    </button>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
        }

        window.selectStepTest = (stepId) => {
            stepTestStep = schemaSteps.find(s => s.id === stepId);
            stepTestChecked = false;
            renderStepTestContent();
        };

        function renderStepTestContent() {
            const step = stepTestStep;
            const container = document.getElementById('step-test-inner');

            let inputsHtml = step.items.map((_, idx) => `
                <div class="flex gap-3 items-start">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br ${step.gradient} text-white flex items-center justify-center font-black text-sm shrink-0 mt-2">${idx + 1}</div>
                    <div class="flex-1">
                        <input type="text" id="st-${step.id}-${idx}" class="test-input w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white font-medium text-base focus:border-blue-500 outline-none" placeholder="נקודה ${idx + 1}..." autocomplete="off" dir="rtl">
                        <div id="st-fb-${step.id}-${idx}" class="hidden mt-1 text-sm font-bold px-2"></div>
                    </div>
                </div>
            `).join('');

            let noteHtml = step.note ? `<div class="text-sm font-bold ${step.textColor} mb-3"><i data-lucide="info" class="w-4 h-4 inline"></i> ${step.note}</div>` : '';

            container.innerHTML = `
                <button onclick="initStepTest()" class="mb-4 flex items-center gap-2 text-slate-500 dark:text-slate-400 font-bold text-sm hover:text-slate-700 dark:hover:text-slate-200 transition">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i> חזרה לבחירת שלב
                </button>
                <div class="rounded-[2rem] overflow-hidden shadow-xl border ${step.borderColor} mb-6">
                    <div class="bg-gradient-to-br ${step.gradient} text-white p-5 flex items-center gap-4">
                        <div class="w-14 h-14 bg-white/15 rounded-xl flex items-center justify-center text-2xl font-black">${step.letter}</div>
                        <div>
                            <div class="text-xl font-black">${step.fullName}</div>
                            <div class="text-white/80 font-bold">${step.hebrewName} • ${step.items.length} נקודות</div>
                        </div>
                    </div>
                    <div class="p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 space-y-3">
                        ${noteHtml}
                        ${inputsHtml}
                    </div>
                </div>
                <div id="st-result" class="hidden mb-6 p-6 rounded-[2rem] shadow-xl border text-center"></div>
                <div class="flex gap-3 mb-10">
                    <button id="st-check-btn" onclick="checkStepTest()" class="flex-1 bg-slate-900 dark:bg-blue-600 text-white font-black text-xl py-4 rounded-2xl shadow-lg hover:bg-slate-800 dark:hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> בדוק מבחן
                    </button>
                    <button onclick="selectStepTest('${step.id}')" class="bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold px-6 py-4 rounded-2xl border border-slate-300 dark:border-slate-600 hover:bg-slate-50 transition">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        window.checkStepTest = () => {
            if (stepTestChecked) return;
            stepTestChecked = true;

            const step = stepTestStep;
            let correctItems = 0;

            step.items.forEach((expected, idx) => {
                const input = document.getElementById(`st-${step.id}-${idx}`);
                const feedback = document.getElementById(`st-fb-${step.id}-${idx}`);
                const userText = input.value.trim();

                if (compareTexts(expected, userText)) {
                    correctItems++;
                    input.classList.add('correct');
                    feedback.classList.remove('hidden');
                    feedback.className = 'mt-1 text-sm font-bold px-2 text-green-600 dark:text-green-400';
                    feedback.innerHTML = '✓ נכון!';
                } else {
                    input.classList.add('wrong');
                    input.readOnly = true;
                    feedback.classList.remove('hidden');
                    feedback.className = 'mt-1 text-sm font-bold px-2 text-red-500 dark:text-red-400';
                    feedback.innerHTML = `✗ צריך להיות: <span class="text-slate-700 dark:text-slate-300">${expected}</span>`;
                }
            });

            const totalItems = step.items.length;
            const score = Math.round((correctItems / totalItems) * 100);
            const resultDiv = document.getElementById('st-result');
            resultDiv.classList.remove('hidden');

            let color = 'text-green-600';
            let bgColor = 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800';
            let msg = 'מושלם! שליטה מלאה בשלב!';
            if (score < 100) { msg = 'כמעט! חזור על הנקודות שפספסת.'; }
            if (score < 80) { msg = 'צריך עוד תרגול.'; color = 'text-orange-500'; bgColor = 'bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800'; }
            if (score < 60) { msg = 'חזור ללמוד את השלב בכרטיסיות.'; color = 'text-red-500'; bgColor = 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'; }

            resultDiv.className = `mb-6 p-6 rounded-[2rem] shadow-xl border text-center ${bgColor}`;
            resultDiv.innerHTML = `
                <div class="text-5xl font-black ${color} mb-2">${score}%</div>
                <div class="text-lg font-bold text-slate-700 dark:text-slate-300 mb-1">${correctItems} מתוך ${totalItems} נקודות נכונות</div>
                <p class="text-slate-500 dark:text-slate-400 font-medium">${msg}</p>
            `;

            document.getElementById('st-check-btn').className = 'flex-1 bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-500 font-black text-xl py-4 rounded-2xl cursor-not-allowed flex items-center justify-center gap-2';

            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        // ====== AMERICAN QUIZ ======
        let quizList = [];
        let quizAnswers = {};
        let quizIdx = 0;

        window.startQuiz = () => {
            // Shuffle options for each question while tracking correct answer
            quizList = quizQuestions.map((q, i) => {
                const correctText = q.options[q.correct];
                const shuffled = shuffleArray([...q.options]);
                return {
                    ...q,
                    quizId: i,
                    options: shuffled,
                    correctIdx: shuffled.indexOf(correctText)
                };
            });
            quizList = shuffleArray(quizList);
            quizAnswers = {};
            quizIdx = 0;

            document.getElementById('quiz-active-view').classList.remove('hidden');
            document.getElementById('quiz-active-view').classList.add('flex');
            document.getElementById('quiz-results-view').classList.add('hidden');
            document.getElementById('quiz-results-view').classList.remove('flex');
            document.getElementById('quiz-review-view').classList.add('hidden');
            document.getElementById('quiz-review-view').classList.remove('flex');

            renderQuiz();
        };

        function renderQuiz() {
            const q = quizList[quizIdx];
            const selected = quizAnswers[q.quizId];

            document.getElementById('quiz-counter').innerText = `שאלה ${quizIdx + 1} מתוך ${quizList.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((quizIdx + 1) / quizList.length) * 100}%`;
            document.getElementById('quiz-question').innerText = q.q;

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const isSelected = selected === idx;
                const style = isSelected
                    ? "bg-indigo-50 dark:bg-indigo-900/40 border-indigo-500 text-indigo-900 dark:text-indigo-300 shadow-sm"
                    : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:border-indigo-300 dark:hover:border-indigo-500";
                const iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 ${isSelected ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300 dark:border-slate-600'}"></div>`;

                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl border-2 flex items-center gap-4 transition-all cursor-pointer ${style}`;
                div.innerHTML = `${iconHtml}<span class="font-bold text-lg leading-tight">${opt}</span>`;
                div.onclick = () => {
                    quizAnswers[q.quizId] = idx;
                    renderQuiz();
                };
                container.appendChild(div);
            });

            const prevBtn = document.getElementById('quiz-prev-btn');
            if (quizIdx === 0) prevBtn.className = "font-bold px-4 sm:px-6 py-3 rounded-xl transition text-slate-300 dark:text-slate-600 cursor-not-allowed";
            else prevBtn.className = "font-bold px-4 sm:px-6 py-3 rounded-xl transition text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700";

            document.getElementById('quiz-next-text').innerText = quizIdx === quizList.length - 1 ? 'סיים חידון' : 'השאלה הבאה';
        }

        window.prevQuiz = () => {
            if (quizIdx > 0) { quizIdx--; renderQuiz(); }
        };

        window.nextQuiz = () => {
            const q = quizList[quizIdx];
            if (quizAnswers[q.quizId] === undefined && !confirm('לא בחרת תשובה, להמשיך?')) return;

            if (quizIdx < quizList.length - 1) {
                quizIdx++;
                renderQuiz();
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            let correctCount = 0;
            quizList.forEach(q => {
                if (quizAnswers[q.quizId] === q.correctIdx) correctCount++;
            });

            const percent = Math.round((correctCount / quizList.length) * 100);
            const wrongCount = quizList.length - correctCount;

            document.getElementById('quiz-active-view').classList.add('hidden');
            document.getElementById('quiz-active-view').classList.remove('flex');
            document.getElementById('quiz-results-view').classList.remove('hidden');
            document.getElementById('quiz-results-view').classList.add('flex');

            const reviewBtn = document.getElementById('quiz-review-btn');
            if (wrongCount > 0) {
                document.getElementById('quiz-wrong-count').innerText = wrongCount;
                reviewBtn.classList.remove('hidden');
            } else {
                reviewBtn.classList.add('hidden');
            }

            document.getElementById('quiz-res-score').innerText = percent;
            document.getElementById('quiz-res-text').innerText = `${correctCount} תשובות נכונות מתוך ${quizList.length}`;

            let msg = "מדהים! שליטה מלאה בסכמה!";
            let color = "text-green-600 dark:text-green-400";
            let icon = "target";

            if (percent < 70) { msg = "יש צורך בחזרה נוספת."; color = "text-orange-500"; icon = "alert-triangle"; }
            if (percent < 50) { msg = "מומלץ ללמוד את הסכמה מחדש."; color = "text-red-500"; icon = "alert-circle"; }

            document.getElementById('quiz-res-msg').innerText = msg;
            document.getElementById('quiz-res-score').className = `text-6xl font-black mb-2 ${color}`;
            const iconEl = document.getElementById('quiz-res-icon');
            iconEl.setAttribute('data-lucide', icon);
            iconEl.className = `mx-auto mb-6 w-16 h-16 ${color}`;
            lucide.createIcons();
        }

        window.showQuizReview = () => {
            const reviewContent = document.getElementById('quiz-review-content');
            reviewContent.innerHTML = '';

            quizList.forEach((q, idx) => {
                const userAnswer = quizAnswers[q.quizId];
                if (userAnswer === q.correctIdx) return;

                let optionsHtml = '';
                q.options.forEach((opt, optIdx) => {
                    const isUserSelected = userAnswer === optIdx;
                    const isCorrect = optIdx === q.correctIdx;
                    let style, iconHtml;

                    if (isCorrect) {
                        style = 'bg-green-50 dark:bg-green-900/20 border-green-400 dark:border-green-600 text-green-800 dark:text-green-300';
                        iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-green-500 bg-green-500 flex items-center justify-center"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>`;
                    } else if (isUserSelected) {
                        style = 'bg-red-50 dark:bg-red-900/20 border-red-400 dark:border-red-600 text-red-800 dark:text-red-300';
                        iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-red-500 bg-red-500 flex items-center justify-center"><i data-lucide="x" class="w-3 h-3 text-white"></i></div>`;
                    } else {
                        style = 'bg-slate-50 dark:bg-slate-900/30 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500';
                        iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-slate-300 dark:border-slate-600"></div>`;
                    }

                    optionsHtml += `<div class="p-3 rounded-xl border-2 flex items-center gap-3 ${style}">${iconHtml}<span class="font-medium text-sm leading-snug">${opt}</span></div>`;
                });

                const item = document.createElement('div');
                item.className = 'bg-white dark:bg-slate-800 rounded-2xl border-2 border-red-200 dark:border-red-900/50 overflow-hidden shadow-sm';
                item.innerHTML = `
                    <div class="p-4 bg-red-50 dark:bg-red-900/10 border-b border-red-100 dark:border-red-900/30">
                        <span class="text-xs font-bold text-red-500 bg-red-100 dark:bg-red-900/30 px-2 py-0.5 rounded-full mb-2 inline-block">שאלה ${idx + 1}</span>
                        <h3 class="font-bold text-slate-800 dark:text-white text-base leading-snug">${q.q}</h3>
                    </div>
                    <div class="p-4 space-y-2">${optionsHtml}</div>
                `;
                reviewContent.appendChild(item);
            });

            document.getElementById('quiz-results-view').classList.add('hidden');
            document.getElementById('quiz-results-view').classList.remove('flex');
            document.getElementById('quiz-review-view').classList.remove('hidden');
            document.getElementById('quiz-review-view').classList.add('flex');
            lucide.createIcons();
        };

        window.showQuizResults = () => {
            document.getElementById('quiz-review-view').classList.add('hidden');
            document.getElementById('quiz-review-view').classList.remove('flex');
            document.getElementById('quiz-results-view').classList.remove('hidden');
            document.getElementById('quiz-results-view').classList.add('flex');
        };

    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
