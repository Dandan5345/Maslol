<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="שאלות חובשים">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאלות חובשים - סכמת X-CARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            display: flex;
            opacity: 1;
            animation: screenFadeIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .dark .loader {
            border: 4px solid #334155;
            border-top: 4px solid #60a5fa;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        body {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 26%),
                radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.16), transparent 24%),
                linear-gradient(135deg, #f8fbff 0%, #eff6ff 46%, #f8fafc 100%);
        }

        .dark body {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 26%),
                radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.12), transparent 24%),
                linear-gradient(135deg, #020617 0%, #0f172a 46%, #111827 100%);
        }

        .step-tab {
            will-change: transform, box-shadow;
        }

        .step-tab.active-tab {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }
        .circle-badge {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: black;
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .schema-content-list li {
            position: relative;
            padding-right: 1.25rem;
            margin-bottom: 0.25rem;
        }
        .schema-content-list li::before {
            content: '○';
            position: absolute;
            right: 0;
            top: 0;
            color: #6b7280;
            font-weight: bold;
        }
        .schema-sub-list li::before {
            content: '-';
            color: #9ca3af;
        }
        .test-input {
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .test-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .test-input.correct {
            border-color: #22c55e !important;
            background-color: rgba(34, 197, 94, 0.08) !important;
        }

        .test-input.wrong {
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.08) !important;
        }
    </style>
</head>

<body class="text-slate-800 dark:text-slate-100 h-dvh flex flex-col transition-colors duration-300 overflow-hidden">

                    <h3 class="text-xl font-black text-slate-800 dark:text-white mb-2">מבחן לפי שלבים</h3>

        <!-- SCREEN: FULL SCHEMA REFERENCE -->
        <div id="screen-full-schema" class="screen flex-col w-full flex-1 overflow-hidden">

                <div class="max-w-3xl mx-auto">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white">הסכמה האחודה לטיפול בפצוע בודד</h2>

                        <button onclick="navigate('home')" class="shrink-0 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 px-4 py-2 rounded-xl text-sm font-bold transition flex items-center gap-2">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i> חזרה

                    </div>
                    <div id="full-schema-content" class="space-y-4"></div>
                </div>
            </div>

    </main>

    <script type="module">
        import { ensureInitialAuth, onUserChanged, signOutUser } from "./firebase-common.js";

        let currentUser = null;
        const currentAxis = 'resuscitation-schema';

        // ====== SCHEMA DATA ======

        // ====== UTILITY FUNCTIONS ======
        function getComparableText(text, keepSpaces = false) {
            return (text || '')
                .normalize('NFKC')
                .toLowerCase()
                .replace(keepSpaces ? /[^0-9a-zA-Z\u0590-\u05ff\s]+/g : /[^0-9a-zA-Z\u0590-\u05ff]+/g, '');
        }

        function normalizeForCompare(text) {
            return getComparableText(text);
        }

        function tokenizeForCompare(text) {
            return getComparableText(text, true)
                .trim()
                .split(/\s+/)
                .filter(Boolean);
        }

        const SHORT_WORD_MAX_LENGTH = 5;
        const SHORT_WORD_TYPO_ALLOWANCE = 1;
        const LONG_WORD_TYPO_ALLOWANCE = 2;
        const MISSING_ACTUAL_WORD_DISPLAY_TEXT = 'לא נכתב';
        const EXTRA_ACTUAL_WORD_DISPLAY_TEXT = 'מיותר';

        function getAllowedTypos(word) {
            return word.length > SHORT_WORD_MAX_LENGTH ? LONG_WORD_TYPO_ALLOWANCE : SHORT_WORD_TYPO_ALLOWANCE;
        }

        function levenshteinDistance(a, b) {
            const rows = a.length + 1;
            const cols = b.length + 1;
            const dp = Array.from({ length: rows }, () => Array(cols).fill(0));

            for (let i = 0; i < rows; i++) dp[i][0] = i;
            for (let j = 0; j < cols; j++) dp[0][j] = j;

            for (let i = 1; i < rows; i++) {
                for (let j = 1; j < cols; j++) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,
                        dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + cost
                    );
                }
            }

            return dp[a.length][b.length];
        }

        function analyzeTextComparison(expected, actual) {
            const expNorm = normalizeForCompare(expected);
            const actNorm = normalizeForCompare(actual);

            if (expNorm === actNorm) {
                return {
                    isAccepted: true,
                    isExact: true,
                    typoCorrections: []
                };
            }

            const expectedWords = tokenizeForCompare(expected);
            const actualWords = tokenizeForCompare(actual);

            if (!actualWords.length) {
                return {
                    isAccepted: false,
                    isExact: false,
                    typoCorrections: [],
                    incorrectWords: []
                };
            }

            if (expectedWords.length !== actualWords.length) {
                return {
                    isAccepted: false,
                    isExact: false,
                    typoCorrections: [],
                    incorrectWords: buildWordPairs(expectedWords, actualWords)
                };
            }

            const typoCorrections = [];
            const incorrectWords = [];

            expectedWords.forEach((expectedWord, idx) => {
                const actualWord = actualWords[idx];
                if (expectedWord === actualWord) return;

                const distance = levenshteinDistance(expectedWord, actualWord);
                if (distance <= getAllowedTypos(expectedWord)) {
                    typoCorrections.push({ actualWord, expectedWord });
                    return;
                }

                incorrectWords.push({ actualWord, expectedWord });
            });

            return {
                isAccepted: incorrectWords.length === 0,
                isExact: false,
                typoCorrections,
                incorrectWords
            };
        }

        function compareTexts(expected, actual) {
            return analyzeTextComparison(expected, actual).isAccepted;
        }

        function escapeHtml(text) {
            return (text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCorrectionPairs(pairs) {
            return pairs
                .filter(pair => pair.expectedWord || pair.actualWord)
                .map(pair => {
                    const actualWord = pair.actualWord || MISSING_ACTUAL_WORD_DISPLAY_TEXT;
                    const expectedWord = pair.expectedWord || EXTRA_ACTUAL_WORD_DISPLAY_TEXT;
                    return `<span class="font-black text-slate-700 dark:text-slate-200">"${escapeHtml(actualWord)}"</span> → <span class="font-black text-slate-700 dark:text-slate-200">"${escapeHtml(expectedWord)}"</span>`;
                })
                .join(', ');
        }

        function buildWordPairs(expectedWords, actualWords) {
            const totalWords = Math.max(expectedWords.length, actualWords.length);
            return Array.from({ length: totalWords }, (_, idx) => ({
                actualWord: actualWords[idx] || '',
                expectedWord: expectedWords[idx] || ''
            })).filter(isMeaningfulWordPair);
        }

        function isMeaningfulWordPair(pair) {
            return (pair.actualWord || pair.expectedWord) && pair.actualWord !== pair.expectedWord;
        }

        function getAcceptedFeedback(expected, comparison) {
            if (comparison.isExact) {
                return {
                    className: 'mt-1 text-sm font-bold px-2 text-green-600 dark:text-green-400',
                    html: '✓ נכון!'
                };
            }

            return {
                className: 'mt-1 text-sm font-bold px-2 text-amber-600 dark:text-amber-400',
                html: `
                    <div>✓ נכון, אבל יש שגיאת כתיב: ${formatCorrectionPairs(comparison.typoCorrections)}</div>
                    <div class="mt-1 text-slate-700 dark:text-slate-300">השורה התקינה: ${escapeHtml(expected)}</div>
                `
            };
        }

        function getRejectedFeedback(expected, actual, comparison) {
            const actualWords = formatCorrectionPairs(comparison.incorrectWords);
            if (!actual) {
                return {
                    className: 'mt-1 text-sm font-bold px-2 text-red-500 dark:text-red-400',
                    html: `<div class="text-slate-700 dark:text-slate-300">השורה התקינה: ${escapeHtml(expected)}</div>`
                };
            }

            return {
                className: 'mt-1 text-sm font-bold px-2 text-red-500 dark:text-red-400',
                html: `
                    <div>✗ טעית ב: ${actualWords}</div>
                    <div class="mt-1 text-slate-700 dark:text-slate-300">השורה התקינה: ${escapeHtml(expected)}</div>
                `
            };
        }

        function getStepNoteTitle(step) {
            if (step.id === 'E') return 'לפני הפינוי';
            if (step.id === 'A' || step.id === 'R') return 'A + R';
            return 'דגש';
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getStepLabel(step) {
            return `${step.letter} - ${step.hebrewName}`;
        }

        function sampleItems(items, count, excludedItems = []) {
            const excludedSet = new Set(excludedItems);
            return shuffleArray(items.filter(item => !excludedSet.has(item))).slice(0, count);
        }

            return { q, correctText, wrongOptions, explanation };

            schemaSteps.forEach((step, idx) => {

            let correctItems = 0;
            schemaSteps.forEach(step => {
                step.items.forEach((expected, idx) => {
                    totalItems++;
                    const input = document.getElementById(`ft-${step.id}-${idx}`);
                    const feedback = document.getElementById(`ft-fb-${step.id}-${idx}`);
                    const userText = input.value.trim();
                    const comparison = analyzeTextComparison(expected, userText);

                    if (comparison.isAccepted) {
                        correctItems++;
                        input.classList.add('correct');
                        feedback.classList.remove('hidden');
                        const acceptedFeedback = getAcceptedFeedback(expected, comparison);
                        feedback.className = acceptedFeedback.className;
                        feedback.innerHTML = acceptedFeedback.html;
                    } else {
                        input.classList.add('wrong');
                        input.readOnly = true;
                        feedback.classList.remove('hidden');
                        const rejectedFeedback = getRejectedFeedback(expected, userText, comparison);
                        feedback.className = rejectedFeedback.className;
                        feedback.innerHTML = rejectedFeedback.html;
                    }
                });

        // ====== STEP TEST ======
        let stepTestStep = null;
        let stepTestChecked = false;

        function initStepTest() {
            stepTestStep = null;
            stepTestChecked = false;
            renderStepTestSelection();
        }

        function renderStepTestSelection() {
            const container = document.getElementById('step-test-inner');
            let html = `
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-2">מבחן לפי שלבים</h2>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">בחר שלב ספציפי ורשום את כל הנקודות שלו. רווחים וסימני פיסוק לא נבדקים, ושגיאות כתיב קטנות מתקבלות עם תיקון.</p>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            `;

            schemaSteps.forEach(step => {
                html += `
                    <button onclick="selectStepTest('${step.id}')" class="group p-5 rounded-[2rem] bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-transparent shadow-sm hover:shadow-xl transition-all duration-300 text-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br ${step.gradient} opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div class="relative z-10">
                            <div class="w-14 h-14 mx-auto bg-gradient-to-br ${step.gradient} text-white rounded-2xl flex items-center justify-center mb-3 text-2xl font-black group-hover:bg-white/20 transition">${step.letter}</div>
                            <div class="font-black text-slate-800 dark:text-white group-hover:text-white transition">${step.hebrewName}</div>
                            <div class="text-xs font-bold text-slate-400 group-hover:text-white/80 transition mt-1">${step.items.length} נקודות</div>
                        </div>
                    </button>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
        }

        window.selectStepTest = (stepId) => {
            stepTestStep = schemaSteps.find(s => s.id === stepId);
            stepTestChecked = false;
            renderStepTestContent();
        };

        function renderStepTestContent() {
            const step = stepTestStep;
            const container = document.getElementById('step-test-inner');

            let inputsHtml = step.items.map((_, idx) => `
                <div class="flex gap-3 items-start">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br ${step.gradient} text-white flex items-center justify-center font-black text-sm shrink-0 mt-2">${idx + 1}</div>
                    <div class="flex-1">
                        <input type="text" id="st-${step.id}-${idx}" class="test-input w-full px-4 py-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-white font-medium text-base focus:border-blue-500 outline-none" placeholder="נקודה ${idx + 1}..." autocomplete="off" dir="rtl">
                        <div id="st-fb-${step.id}-${idx}" class="hidden mt-1 text-sm font-bold px-2"></div>
                    </div>
                </div>
            `).join('');

            let noteHtml = '';
            if (step.note) {
                const noteTitle = getStepNoteTitle(step);
                noteHtml = `<div class="mb-3 px-4 py-3 rounded-2xl ${step.lightBg} ${step.borderColor} border">
                    <div class="flex items-start gap-2">
                        <i data-lucide="info" class="w-4 h-4 ${step.textColor} shrink-0 mt-0.5"></i>
                        <div>
                            <div class="font-black text-[11px] uppercase tracking-[0.18em] ${step.textColor} mb-1">${noteTitle}</div>
                            <div class="text-sm font-bold leading-6 ${step.textColor}">${step.note}</div>
                        </div>
                    </div>
                </div>`;
            }

            container.innerHTML = `
                <button onclick="initStepTest()" class="mb-4 flex items-center gap-2 text-slate-500 dark:text-slate-400 font-bold text-sm hover:text-slate-700 dark:hover:text-slate-200 transition">
                    <i data-lucide="chevron-right" class="w-4 h-4"></i> חזרה לבחירת שלב
                </button>
                <div class="rounded-[2rem] overflow-hidden shadow-xl border ${step.borderColor} mb-6">
                    <div class="bg-gradient-to-br ${step.gradient} text-white p-5 flex items-center gap-4">
                        <div class="w-14 h-14 bg-white/15 rounded-xl flex items-center justify-center text-2xl font-black">${step.letter}</div>
                        <div>
                            <div class="text-xl font-black">${step.fullName}</div>
                            <div class="text-white/80 font-bold">${step.hebrewName} • ${step.items.length} נקודות</div>
                        </div>
                    </div>
                    <div class="p-4 sm:p-6 bg-slate-50 dark:bg-slate-900/50 space-y-3">
                        ${noteHtml}
                        ${inputsHtml}
                    </div>
                </div>
                <div id="st-result" class="hidden mb-6 p-6 rounded-[2rem] shadow-xl border text-center"></div>
                <div class="flex gap-3 mb-10">
                    <button id="st-check-btn" onclick="checkStepTest()" class="flex-1 bg-slate-900 dark:bg-blue-600 text-white font-black text-xl py-4 rounded-2xl shadow-lg hover:bg-slate-800 dark:hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-6 h-6"></i> בדוק מבחן
                    </button>
                    <button onclick="selectStepTest('${step.id}')" class="bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold px-6 py-4 rounded-2xl border border-slate-300 dark:border-slate-600 hover:bg-slate-50 transition">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        window.checkStepTest = () => {
            if (stepTestChecked) return;
            stepTestChecked = true;

            const step = stepTestStep;
            let correctItems = 0;

            step.items.forEach((expected, idx) => {
                const input = document.getElementById(`st-${step.id}-${idx}`);
                const feedback = document.getElementById(`st-fb-${step.id}-${idx}`);
                const userText = input.value.trim();
                const comparison = analyzeTextComparison(expected, userText);

                if (comparison.isAccepted) {
                    correctItems++;
                    input.classList.add('correct');
                    feedback.classList.remove('hidden');
                    const acceptedFeedback = getAcceptedFeedback(expected, comparison);
                    feedback.className = acceptedFeedback.className;
                    feedback.innerHTML = acceptedFeedback.html;
                } else {
                    input.classList.add('wrong');
                    input.readOnly = true;
                    feedback.classList.remove('hidden');
                    const rejectedFeedback = getRejectedFeedback(expected, userText, comparison);
                    feedback.className = rejectedFeedback.className;
                    feedback.innerHTML = rejectedFeedback.html;
                }
            });

            const totalItems = step.items.length;
            const score = Math.round((correctItems / totalItems) * 100);
            const resultDiv = document.getElementById('st-result');
            resultDiv.classList.remove('hidden');

            let color = 'text-green-600';
            let bgColor = 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800';
            let msg = 'מושלם! שליטה מלאה בשלב!';
            if (score < 100) { msg = 'כמעט! חזור על הנקודות שפספסת.'; }
            if (score < 80) { msg = 'צריך עוד תרגול.'; color = 'text-orange-500'; bgColor = 'bg-orange-50 dark:bg-orange-900/20 border-orange-200 dark:border-orange-800'; }
            if (score < 60) { msg = 'חזור ללמוד את השלב בכרטיסיות.'; color = 'text-red-500'; bgColor = 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'; }

            resultDiv.className = `mb-6 p-6 rounded-[2rem] shadow-xl border text-center ${bgColor}`;
            resultDiv.innerHTML = `
                <div class="text-5xl font-black ${color} mb-2">${score}%</div>
                <div class="text-lg font-bold text-slate-700 dark:text-slate-300 mb-1">${correctItems} מתוך ${totalItems} נקודות נכונות</div>
                <p class="text-slate-500 dark:text-slate-400 font-medium">${msg}</p>
            `;

            document.getElementById('st-check-btn').className = 'flex-1 bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-500 font-black text-xl py-4 rounded-2xl cursor-not-allowed flex items-center justify-center gap-2';

            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        // ====== REVIEW QUESTIONS ======
        let quizList = [];
        let quizAnswers = {};
        let quizAnswered = {};
        let quizIdx = 0;

        window.startQuiz = () => {
            quizList = shuffleArray(quizQuestionBank)
                .slice(0, Math.min(QUIZ_SESSION_LENGTH, quizQuestionBank.length))
                .map((question, i) => {
                    const options = shuffleArray([question.correctText, ...question.wrongOptions]);
                    return {
                        ...question,
                        quizId: i,
                        options,
                        correctIdx: options.indexOf(question.correctText)
                    };
                });
            quizAnswers = {};
            quizAnswered = {};
            quizIdx = 0;

            document.getElementById('quiz-active-view').classList.remove('hidden');
            document.getElementById('quiz-active-view').classList.add('flex');
            document.getElementById('quiz-results-view').classList.add('hidden');
            document.getElementById('quiz-results-view').classList.remove('flex');
            document.getElementById('quiz-review-view').classList.add('hidden');
            document.getElementById('quiz-review-view').classList.remove('flex');

            renderQuiz();
        };

        function renderQuiz() {
            const q = quizList[quizIdx];
            const selected = quizAnswers[q.quizId];
            const isAnswered = Boolean(quizAnswered[q.quizId]);

            document.getElementById('quiz-counter').innerText = `שאלת חזרה ${quizIdx + 1} מתוך ${quizList.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((quizIdx + 1) / quizList.length) * 100}%`;
            document.getElementById('quiz-question').innerText = q.q;

            const container = document.getElementById('quiz-options');
            container.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const isSelected = selected === idx;
                const isCorrect = idx === q.correctIdx;
                let style = "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:border-indigo-300 dark:hover:border-indigo-500";
                let iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-slate-300 dark:border-slate-600"></div>`;

                if (!isAnswered && isSelected) {
                    style = "bg-indigo-50 dark:bg-indigo-900/40 border-indigo-500 text-indigo-900 dark:text-indigo-300 shadow-sm";
                    iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-indigo-600 bg-indigo-600"></div>`;
                }

                if (isAnswered && isCorrect) {
                    style = "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-900 dark:text-green-300 shadow-sm";
                    iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-green-500 bg-green-500 flex items-center justify-center"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>`;
                } else if (isAnswered && isSelected) {
                    style = "bg-red-50 dark:bg-red-900/20 border-red-500 text-red-900 dark:text-red-300 shadow-sm";
                    iconHtml = `<div class="w-5 h-5 rounded-full shrink-0 border-2 border-red-500 bg-red-500 flex items-center justify-center"><i data-lucide="x" class="w-3 h-3 text-white"></i></div>`;
                } else if (isAnswered) {
                    style = "bg-slate-50 dark:bg-slate-900/30 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500";
                }

                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl border-2 flex items-center gap-4 transition-all ${isAnswered ? 'cursor-default' : 'cursor-pointer'} ${style}`;
                div.innerHTML = `${iconHtml}<span class="font-bold text-lg leading-tight">${opt}</span>`;
                div.onclick = () => {
                    if (quizAnswered[q.quizId]) return;
                    quizAnswers[q.quizId] = idx;
                    quizAnswered[q.quizId] = true;
                    renderQuiz();
                };
                container.appendChild(div);
            });

            const feedbackEl = document.getElementById('quiz-feedback');
            const nextBtn = document.getElementById('quiz-next-btn');
            const nextText = document.getElementById('quiz-next-text');
            const statusHint = document.getElementById('quiz-status-hint');

            if (isAnswered) {
                const answeredCorrectly = selected === q.correctIdx;
                feedbackEl.classList.remove('hidden');
                feedbackEl.className = `mt-6 rounded-[1.5rem] border px-4 py-4 text-right ${answeredCorrectly ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-800 dark:text-green-300' : 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300'}`;
                feedbackEl.innerHTML = `
                    <div class="font-black text-base mb-1">${answeredCorrectly ? 'כל הכבוד, צדקת!' : 'לא מדויק — זאת התשובה הנכונה:'}</div>
                    <div class="font-bold mb-1">${q.options[q.correctIdx]}</div>
                    <div class="text-sm font-medium leading-relaxed">${q.explanation}</div>
                `;
                statusHint.innerText = answeredCorrectly ? 'ענית נכון — אפשר להמשיך' : 'קיבלת משוב מיידי — אפשר להמשיך';
                nextBtn.className = 'bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 sm:px-8 py-3.5 rounded-xl shadow-lg flex items-center gap-2 transition-colors';
                nextText.innerText = quizIdx === quizList.length - 1 ? 'סיום הסבב' : 'לשאלה הבאה';
            } else {
                feedbackEl.classList.add('hidden');
                statusHint.innerText = 'בחר תשובה כדי לקבל משוב מיידי';
                nextBtn.className = 'bg-slate-300 dark:bg-slate-700 text-slate-500 dark:text-slate-500 font-black px-6 sm:px-8 py-3.5 rounded-xl shadow-lg flex items-center gap-2 transition-colors cursor-not-allowed';
                nextText.innerText = 'ענה כדי להמשיך';
            }

            lucide.createIcons();
        }

        window.nextQuiz = () => {
            const q = quizList[quizIdx];
            if (!quizAnswered[q.quizId]) return;

            if (quizIdx < quizList.length - 1) {
                quizIdx++;
                renderQuiz();
            } else {
                finishQuiz();
            }
        };

        function finishQuiz() {
            let correctCount = 0;
            quizList.forEach(q => {
                if (quizAnswers[q.quizId] === q.correctIdx) correctCount++;
            });

            const percent = Math.round((correctCount / quizList.length) * 100);
            const wrongCount = quizList.length - correctCount;

            document.getElementById('quiz-active-view').classList.add('hidden');
            document.getElementById('quiz-active-view').classList.remove('flex');
            document.getElementById('quiz-results-view').classList.remove('hidden');
            document.getElementById('quiz-results-view').classList.add('flex');
            document.getElementById('quiz-review-btn').classList.add('hidden');

            document.getElementById('quiz-res-score').innerText = percent;
            document.getElementById('quiz-res-text').innerText = `${correctCount} תשובות נכונות מתוך ${quizList.length}`;

            let msg = 'מעולה! סיימת סבב חזרה חזק.';
            let color = 'text-green-600 dark:text-green-400';
            let icon = 'target';

            if (wrongCount > 0) {
                msg = `ענית נכון על ${correctCount} שאלות. אפשר להתחיל מיד סבב חדש עם שאלות אחרות מהמאגר.`;
                color = 'text-indigo-600 dark:text-indigo-400';
                icon = 'rotate-ccw';
            }
            if (percent < 50) {
                msg = 'מומלץ לחזור לכרטיסיות או לסכמה המלאה ואז להתחיל סבב נוסף.';
                color = 'text-red-500';
                icon = 'alert-circle';
            }

            document.getElementById('quiz-res-msg').innerText = msg;
            document.getElementById('quiz-res-score').className = `text-6xl font-black mb-2 ${color}`;
            const iconEl = document.getElementById('quiz-res-icon');
            iconEl.setAttribute('data-lucide', icon);
            iconEl.className = `mx-auto mb-6 w-16 h-16 ${color}`;
            lucide.createIcons();
        }

        window.showQuizReview = () => { };
        window.showQuizResults = () => { };

    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
    <script src="shared-navigation.js" defer></script>
</body>

</html>
