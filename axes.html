<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="שאלות חובשים">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאלות חובשים - בחירת ציר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-6px);
        }

        .card-hover:active {
            transform: translateY(-2px);
        }

        .card-active {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.35), 0 18px 40px rgba(15, 23, 42, 0.18);
        }

        .construction-card {
            position: relative;
            overflow: hidden;
        }

        .construction-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 10px,
                    rgba(0, 0, 0, 0.02) 10px,
                    rgba(0, 0, 0, 0.02) 20px);
            pointer-events: none;
            border-radius: inherit;
        }
    </style>
</head>

<body
    class="min-h-screen overflow-x-hidden bg-gradient-to-br from-slate-50 via-blue-50/30 to-slate-100 text-slate-800 transition-colors duration-300 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 dark:text-slate-100">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-20 left-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-blue-400/10 blur-[100px]">
        </div>
        <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-cyan-400/10 blur-[100px]"></div>
        <div class="absolute top-1/3 left-0 h-64 w-64 rounded-full bg-purple-400/5 blur-[80px]"></div>
    </div>

    <div id="page-loader"
        class="fixed inset-0 z-50 flex items-center justify-center bg-white/90 dark:bg-slate-950/90 backdrop-blur-sm">
        <div class="text-center">
            <div
                class="mx-auto mb-4 h-12 w-12 animate-spin rounded-full border-4 border-slate-200 border-t-blue-600 dark:border-slate-700 dark:border-t-blue-400">
            </div>
            <p class="font-bold text-slate-500 dark:text-slate-400">טוען את הצירים שלך...</p>
        </div>
    </div>

    <div id="modal-construction" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeConstructionModal()"></div>
        <div
            class="relative z-10 w-full max-w-sm rounded-[2rem] border border-slate-100 bg-white p-8 text-center shadow-2xl dark:border-slate-700 dark:bg-slate-800 animate-fade-in">
            <div
                class="mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-[1.5rem] bg-amber-100 dark:bg-amber-900/30">
                <i data-lucide="hard-hat" class="h-10 w-10 text-amber-600 dark:text-amber-300"></i>
            </div>
            <h3 class="mb-2 text-2xl font-black dark:text-white">הציר בבנייה 🚧</h3>
            <p id="modal-construction-text"
                class="mb-6 text-sm font-medium leading-relaxed text-slate-500 dark:text-slate-400">ציר זה נמצא כרגע
                בשלבי בנייה ועדיין לא זמין. ברגע שיהיה מוכן תוכלו להיכנס!</p>
            <button onclick="closeConstructionModal()"
                class="w-full rounded-2xl bg-slate-900 px-6 py-3.5 text-base font-black text-white transition hover:bg-slate-800 dark:bg-blue-600 dark:hover:bg-blue-700">
                הבנתי, חזרה לבחירת ציר
            </button>
        </div>
    </div>

    <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-6 sm:px-6 sm:py-10">
        <header
            class="mb-8 flex flex-wrap items-center justify-between gap-4 rounded-[2rem] border border-white/80 bg-white/90 p-5 shadow-lg shadow-slate-200/50 backdrop-blur-xl dark:border-slate-700/70 dark:bg-slate-900/90 dark:shadow-slate-900/50 animate-slide-up sm:p-6">
            <div>
                <div
                    class="mb-1 inline-flex items-center gap-2 rounded-full bg-blue-100 px-3 py-1 text-xs font-bold text-blue-700 dark:bg-blue-900/30 dark:text-blue-300">
                    <i data-lucide="compass" class="h-3.5 w-3.5"></i>
                    בחירת ציר לימוד
                </div>
                <h1 class="text-2xl font-black sm:text-3xl">בחרו מאיפה להמשיך ללמוד</h1>
                <p id="axes-subtitle" class="mt-1.5 text-sm font-medium text-slate-500 dark:text-slate-400">הציר האחרון
                    שלכם יודגש אוטומטית.</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()"
                    class="inline-flex items-center gap-2 rounded-2xl bg-slate-100 px-4 py-2.5 text-sm font-bold text-slate-600 transition hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
                    <i data-lucide="moon" id="dark-icon" class="h-4 w-4"></i>
                    תצוגה
                </button>
                <button onclick="handleLogout()"
                    class="inline-flex items-center gap-2 rounded-2xl bg-red-50 px-4 py-2.5 text-sm font-bold text-red-600 transition hover:bg-red-100 dark:bg-red-900/20 dark:text-red-300 dark:hover:bg-red-900/30">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    התנתקות
                </button>
            </div>
        </header>

        <div class="mb-4 flex items-center gap-2 px-1 animate-slide-up" style="animation-delay: 0.1s;">
            <div class="h-2 w-2 rounded-full bg-green-500"></div>
            <span class="text-sm font-bold text-slate-600 dark:text-slate-400">צירים פעילים</span>
            <div class="flex-1 border-t border-slate-200 dark:border-slate-700/50"></div>
        </div>

        <section class="mb-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
            <button data-axis-card="resuscitation" onclick="openAxis('resuscitation')"
                class="card-hover group flex flex-col rounded-2xl border border-blue-300/40 bg-gradient-to-br from-blue-600 via-blue-500 to-cyan-500 p-4 text-right text-white shadow-lg shadow-blue-500/20 animate-slide-up"
                style="animation-delay: 0.15s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-white/20 backdrop-blur-sm">
                    <i data-lucide="heart-pulse" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black leading-tight" data-axis-title>ציר החייאה</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-blue-50/85">כרטיסיות למידה, תרגול ומבחן מסכם.
                </p>
                <div class="mt-auto flex items-center justify-between text-xs font-bold">
                    <span class="rounded-full bg-white/20 px-2.5 py-1 backdrop-blur-sm">✓ זמין</span>
                    <span class="inline-flex items-center gap-0.5 opacity-75 transition group-hover:opacity-100">כניסה
                        <i data-lucide="chevron-left" class="h-3.5 w-3.5"></i></span>
                </div>
            </button>

            <button data-axis-card="resuscitation-schema" onclick="openAxis('resuscitation-schema')"
                class="card-hover group flex flex-col rounded-2xl border border-orange-300/40 bg-gradient-to-br from-orange-600 via-orange-500 to-amber-500 p-4 text-right text-white shadow-lg shadow-orange-500/20 animate-slide-up"
                style="animation-delay: 0.2s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-white/20 backdrop-blur-sm">
                    <i data-lucide="file-text" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black leading-tight" data-axis-title>ציר סכמת טיפול בפצוע</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-orange-50/85">למידה, מבחן מילה במילה, מבחן לפי
                    שלבים וחידון.</p>
                <div class="mt-auto flex items-center justify-between text-xs font-bold">
                    <span class="rounded-full bg-white/20 px-2.5 py-1 backdrop-blur-sm">✓ זמין</span>
                    <span class="inline-flex items-center gap-0.5 opacity-75 transition group-hover:opacity-100">כניסה
                        <i data-lucide="chevron-left" class="h-3.5 w-3.5"></i></span>
                </div>
            </button>

            <button data-axis-card="trauma" onclick="openAxis('trauma')"
                class="card-hover group flex flex-col rounded-2xl border border-red-300/40 bg-gradient-to-br from-red-600 via-red-500 to-rose-500 p-4 text-right text-white shadow-lg shadow-red-500/20 animate-slide-up"
                style="animation-delay: 0.25s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-white/20 backdrop-blur-sm">
                    <i data-lucide="shield-plus" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black leading-tight" data-axis-title>ציר טראומה</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-red-50/85">כניסה ישירה למסך טראומה עם מבחן 39,
                    מבחן 100 וכרטיסיות.</p>
                <div class="mt-auto flex items-center justify-between text-xs font-bold">
                    <span class="rounded-full bg-white/20 px-2.5 py-1 backdrop-blur-sm">✓ זמין</span>
                    <span class="inline-flex items-center gap-0.5 opacity-75 transition group-hover:opacity-100">כניסה
                        <i data-lucide="chevron-left" class="h-3.5 w-3.5"></i></span>
                </div>
            </button>
        </section>

        <div class="mb-3 flex items-center gap-2 px-1 animate-slide-up" style="animation-delay: 0.3s;">
            <div class="h-2 w-2 rounded-full bg-amber-500"></div>
            <span class="text-sm font-bold text-slate-600 dark:text-slate-400">צירים בבנייה</span>
            <div class="flex-1 border-t border-slate-200 dark:border-slate-700/50"></div>
        </div>

        <section class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
            <button data-axis-card="routine" onclick="openAxis('routine')"
                class="card-hover construction-card group flex flex-col rounded-2xl border border-slate-200/80 bg-white/90 p-4 text-right shadow-sm backdrop-blur-sm dark:border-slate-700/60 dark:bg-slate-800/90 animate-slide-up"
                style="animation-delay: 0.35s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-300">
                    <i data-lucide="stethoscope" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black" data-axis-title>ציר שגרה</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-slate-500 dark:text-slate-400">ציר זה יכלול תוכן
                    בנושא רפואת שגרה.</p>
                <div class="mt-auto">
                    <span
                        class="inline-flex items-center gap-1 rounded-full bg-amber-100 px-2.5 py-1 text-xs font-bold text-amber-700 dark:bg-amber-900/30 dark:text-amber-300">
                        <i data-lucide="hard-hat" class="h-3 w-3"></i> בבנייה
                    </span>
                </div>
            </button>

            <button data-axis-card="anamnesis" onclick="openAxis('anamnesis')"
                class="card-hover construction-card group flex flex-col rounded-2xl border border-slate-200/80 bg-white/90 p-4 text-right shadow-sm backdrop-blur-sm dark:border-slate-700/60 dark:bg-slate-800/90 animate-slide-up"
                style="animation-delay: 0.4s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-300">
                    <i data-lucide="clipboard-list" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black" data-axis-title>ציר אנמנזה</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-slate-500 dark:text-slate-400">ציר זה יכלול תוכן
                    בנושא נטילת אנמנזה.</p>
                <div class="mt-auto">
                    <span
                        class="inline-flex items-center gap-1 rounded-full bg-amber-100 px-2.5 py-1 text-xs font-bold text-amber-700 dark:bg-amber-900/30 dark:text-amber-300">
                        <i data-lucide="hard-hat" class="h-3 w-3"></i> בבנייה
                    </span>
                </div>
            </button>

            <button data-axis-card="mental-health" onclick="openAxis('mental-health')"
                class="card-hover construction-card group flex flex-col rounded-2xl border border-slate-200/80 bg-white/90 p-4 text-right shadow-sm backdrop-blur-sm dark:border-slate-700/60 dark:bg-slate-800/90 animate-slide-up"
                style="animation-delay: 0.45s;">
                <div
                    class="mb-3 inline-flex h-10 w-10 items-center justify-center rounded-xl bg-fuchsia-100 text-fuchsia-600 dark:bg-fuchsia-900/30 dark:text-fuchsia-300">
                    <i data-lucide="brain" class="h-5 w-5"></i>
                </div>
                <div class="mb-1 text-base font-black" data-axis-title>ציר בריאות הנפש</div>
                <p class="mb-3 text-xs font-medium leading-relaxed text-slate-500 dark:text-slate-400">ציר זה יכלול תוכן
                    בנושא בריאות הנפש.</p>
                <div class="mt-auto">
                    <span
                        class="inline-flex items-center gap-1 rounded-full bg-amber-100 px-2.5 py-1 text-xs font-bold text-amber-700 dark:bg-amber-900/30 dark:text-amber-300">
                        <i data-lucide="hard-hat" class="h-3 w-3"></i> בבנייה
                    </span>
                </div>
            </button>
        </section>

        <footer class="mt-auto pb-4 pt-8 text-center">
            <p class="text-xs font-medium text-slate-400 dark:text-slate-600">שאלות חובשים &copy; 2025</p>
        </footer>
    </main>

    <script type="module">
        import { ensureInitialAuth, onUserChanged, signOutUser, loadUserPreferences, setLastAxis, getAxisHref, getAxisLabel, isUnderConstruction } from './firebase-common.js';

        const loader = document.getElementById('page-loader');
        let currentUser = null;

        function applyDarkMode() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        window.toggleDarkMode = () => {
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            applyDarkMode();
        };

        window.handleLogout = async () => {
            if (confirm('האם להתנתק?')) {
                await signOutUser();
                window.location.replace('login.html');
            }
        };

        function hideLoader() {
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 250);
        }

        function highlightAxis(axisId) {
            document.querySelectorAll('[data-axis-card]').forEach(card => {
                card.classList.remove('card-active');
            });
            const activeCard = document.querySelector(`[data-axis-card="${axisId}"]`);
            if (activeCard) {
                activeCard.classList.add('card-active');
            }
        }

        window.openAxis = async (axisId) => {
            if (!currentUser) {
                window.location.replace('login.html');
                return;
            }

            if (isUnderConstruction(axisId)) {
                showConstructionModal(axisId);
                return;
            }

            await setLastAxis(currentUser.uid, axisId);
            window.location.href = getAxisHref(axisId);
        };

        window.showConstructionModal = (axisId) => {
            document.getElementById('modal-construction-text').textContent = `${getAxisLabel(axisId)} נמצא כרגע בשלבי בנייה ועדיין לא זמין. ברגע שיהיה מוכן תוכלו להיכנס!`;
            const modal = document.getElementById('modal-construction');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        };

        window.closeConstructionModal = () => {
            const modal = document.getElementById('modal-construction');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        applyDarkMode();
        await ensureInitialAuth();

        onUserChanged(async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }

            currentUser = user;
            const preferences = await loadUserPreferences(user.uid);
            if (preferences.lastAxis) {
                document.getElementById('axes-subtitle').textContent = `הציר האחרון שלך: ${getAxisLabel(preferences.lastAxis)}`;
                highlightAxis(preferences.lastAxis);
            }
            hideLoader();
        });
    </script>
    <script src="shared-navigation.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
</body>

</html>
