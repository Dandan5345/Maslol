<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="שאלות חובשים">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאלות חובשים - בחירת ציר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --axes-bg: #0b0f19;
            --axes-card: rgba(255, 255, 255, 0.06);
            --axes-border: rgba(255, 255, 255, 0.12);
            --axes-text: #f8fafc;
            --axes-muted: rgba(226, 232, 240, 0.72);
        }

        body {
            background-color: var(--axes-bg);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(79, 172, 254, 0.16), transparent 24%),
                radial-gradient(circle at 85% 10%, rgba(0, 242, 254, 0.1), transparent 22%),
                radial-gradient(circle at 50% 100%, rgba(59, 130, 246, 0.12), transparent 30%);
        }

        .axes-panel {
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 60px rgba(2, 6, 23, 0.42);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .axes-hero {
            position: relative;
            overflow: hidden;
        }

        .axes-hero::after {
            content: '';
            position: absolute;
            inset: auto -20% -45% auto;
            width: 240px;
            height: 240px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            filter: blur(16px);
        }

        .axis-card {
            position: relative;
            overflow: hidden;
            border-radius: 1.75rem;
            padding: 1.35rem;
            border: 1px solid var(--axes-border);
            background: var(--axes-card);
            color: var(--axes-text);
            box-shadow: 0 18px 40px rgba(2, 6, 23, 0.26);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            min-height: 210px;
        }

        .axis-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.38);
        }

        .axis-card.is-active {
            border-color: rgba(255, 255, 255, 0.78);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2), 0 24px 48px rgba(15, 23, 42, 0.42);
        }

        .axis-card__icon {
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 1.15rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.14);
            margin-bottom: 1rem;
        }

        .axis-card__title {
            font-size: 1.35rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .axis-card__description {
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        .axis-card__footer {
            margin-top: auto;
            padding-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .axis-card--light {
            color: #e2e8f0;
        }

        .axis-card--white {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            border-color: rgba(148, 163, 184, 0.24);
        }

        .axis-card--white .axis-card__icon {
            background: rgba(15, 23, 42, 0.06);
        }

        .axis-card--white .axis-card__description {
            color: #475569;
        }

        .axis-card--resuscitation {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
        }

        .axis-card--schema {
            background: linear-gradient(135deg, #ea580c 0%, #ef4444 100%);
        }

        .axis-card--trauma {
            background: linear-gradient(135deg, #b91c1c 0%, #ef4444 100%);
        }

        .axis-card--routine {
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
        }

        .axis-card--anamnesis {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
        }

        .axis-card--mental {
            background: linear-gradient(135deg, #a21caf 0%, #d946ef 100%);
        }

        .axes-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 800;
        }
    </style>
</head>

<body
    class="min-h-screen overflow-x-hidden text-slate-100 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-10 left-1/2 h-52 w-52 -translate-x-1/2 rounded-full bg-cyan-300/10 blur-3xl"></div>
        <div class="absolute bottom-0 right-0 h-64 w-64 rounded-full bg-blue-400/10 blur-3xl"></div>
        <div class="absolute top-16 right-5 text-7xl opacity-15">🚑</div>
    </div>

    <div id="page-loader"
        class="fixed inset-0 z-50 flex items-center justify-center bg-white/90 dark:bg-slate-950/90 backdrop-blur-sm">
        <div class="text-center">
            <div
                class="mx-auto mb-4 h-12 w-12 animate-spin rounded-full border-4 border-slate-200 border-t-blue-600 dark:border-slate-700 dark:border-t-blue-400">
            </div>
            <p class="font-bold text-slate-500 dark:text-slate-400">טוען את הצירים שלך...</p>
        </div>
    </div>

    <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-5 sm:px-6 sm:py-8">
        <header
            class="axes-panel axes-hero mb-6 flex flex-wrap items-center justify-between gap-4 rounded-[2rem] p-5 sm:p-6">
            <div>
                <p class="mb-2 text-sm font-black text-cyan-300">בחירת ציר</p>
                <h1 class="text-3xl font-black sm:text-4xl">בחרו מאיפה להמשיך ללמוד</h1>
                <p id="axes-subtitle" class="mt-2 max-w-2xl text-sm font-medium text-slate-300">הציר האחרון שלכם יודגש
                    אוטומטית, וכל כרטיס מוביל ישירות למסך הרלוונטי.</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()"
                    class="inline-flex items-center gap-2 rounded-full bg-white/10 px-4 py-2 text-sm font-bold text-slate-100 transition hover:bg-white/15">
                    <i data-lucide="moon" id="dark-icon" class="h-4 w-4"></i>
                    תצוגה
                </button>
                <button onclick="handleLogout()"
                    class="inline-flex items-center gap-2 rounded-full bg-red-500/15 px-4 py-2 text-sm font-bold text-red-100 transition hover:bg-red-500/25">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    התנתקות
                </button>
            </div>
        </header>

        <section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
            <button data-axis-card="resuscitation" onclick="openAxis('resuscitation')"
                class="axis-card axis-card--resuscitation group flex flex-col text-right">
                <div class="axis-card__icon"><i data-lucide="heart-pulse" class="h-6 w-6"></i></div>
                <div class="axis-card__title">ציר החייאה</div>
                <p class="axis-card__description">כרטיסיות, תרגול אינסופי ומבחן מסכם עם שמירת התקדמות בענן.</p>
                <div class="axis-card__footer">
                    <span class="axes-chip">מוכן עכשיו</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>

            <button data-axis-card="resuscitation-schema" onclick="openAxis('resuscitation-schema')"
                class="axis-card axis-card--schema group flex flex-col text-right">
                <div class="axis-card__icon"><i data-lucide="file-text" class="h-6 w-6"></i></div>
                <div class="axis-card__title">סכמת X-CARE</div>
                <p class="axis-card__description">למידה לפי שלבים, מבחן סכמה מילה במילה וחידון אמריקאי במקום אחד.</p>
                <div class="axis-card__footer">
                    <span class="axes-chip">מוכן עכשיו</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>

            <button data-axis-card="trauma" onclick="openAxis('trauma')"
                class="axis-card axis-card--trauma group flex flex-col text-right">
                <div class="axis-card__icon"><i data-lucide="shield-plus" class="h-6 w-6"></i></div>
                <div class="axis-card__title">ציר טראומה</div>
                <p class="axis-card__description">כניסה ישירה למסך טראומה עם מבחן 39, מבחן 100 וכרטיסיות בלי דף ביניים.
                </p>
                <div class="axis-card__footer">
                    <span class="axes-chip">ישיר למסך טראומה</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>

            <button data-axis-card="routine" onclick="openAxis('routine')"
                class="axis-card axis-card--routine group flex flex-col text-right">
                <div class="axis-card__icon"><i data-lucide="stethoscope" class="h-6 w-6"></i></div>
                <div class="axis-card__title">ציר שגרה</div>
                <p class="axis-card__description">עמוד נפרד להמשך הרחבה, עם ניווט אחיד וכפתורי בית וחזרה.</p>
                <div class="axis-card__footer">
                    <span class="axes-chip">מוכן להרחבה</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>

            <button data-axis-card="anamnesis" onclick="openAxis('anamnesis')"
                class="axis-card axis-card--anamnesis group flex flex-col text-right">
                <div class="axis-card__icon"><i data-lucide="clipboard-list" class="h-6 w-6"></i></div>
                <div class="axis-card__title">ציר אנמנזה</div>
                <p class="axis-card__description">מסך ייעודי לתוכן עתידי, עכשיו עם פריסה תואמת לשאר האפליקציה.</p>
                <div class="axis-card__footer">
                    <span class="axes-chip">זמין</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>

            <button data-axis-card="mental-health" onclick="openAxis('mental-health')"
                class="axis-card axis-card--mental group flex flex-col text-right sm:col-span-2 xl:col-span-1">
                <div class="axis-card__icon"><i data-lucide="brain" class="h-6 w-6"></i></div>
                <div class="axis-card__title">ציר בריאות הנפש</div>
                <p class="axis-card__description">מסך עצמאי להמשך פיתוח, עם אותו ניווט חדש וכפתורים קבועים.</p>
                <div class="axis-card__footer">
                    <span class="axes-chip">זמין</span>
                    <span class="inline-flex items-center gap-1">כניסה <i data-lucide="chevron-left"
                            class="h-4 w-4"></i></span>
                </div>
            </button>
        </section>
    </main>

    <script type="module">
        import { ensureInitialAuth, onUserChanged, signOutUser, loadUserPreferences, setLastAxis, getAxisHref } from './firebase-common.js';

        const loader = document.getElementById('page-loader');
        let currentUser = null;

        function applyDarkMode() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'sun');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('dark-icon').setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        window.toggleDarkMode = () => {
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
            applyDarkMode();
        };

        window.handleLogout = async () => {
            if (confirm('האם להתנתק?')) {
                await signOutUser();
                window.location.replace('login.html');
            }
        };

        function hideLoader() {
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 250);
        }

        function highlightAxis(axisId) {
            document.querySelectorAll('[data-axis-card]').forEach(card => {
                card.classList.remove('is-active');
            });
            const activeCard = document.querySelector(`[data-axis-card="${axisId}"]`);
            if (activeCard) {
                activeCard.classList.add('is-active');
            }
        }

        window.openAxis = async (axisId) => {
            if (!currentUser) {
                window.location.replace('login.html');
                return;
            }
            await setLastAxis(currentUser.uid, axisId);
            window.location.href = getAxisHref(axisId);
        };

        applyDarkMode();
        await ensureInitialAuth();

        onUserChanged(async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }

            currentUser = user;
            const preferences = await loadUserPreferences(user.uid);
            if (preferences.lastAxis) {
                document.getElementById('axes-subtitle').textContent = `הציר האחרון שלך: ${document.querySelector(`[data-axis-card="${preferences.lastAxis}"]`)?.querySelector('.axis-card__title')?.textContent || 'לא נבחר עדיין'}`;
                highlightAxis(preferences.lastAxis);
            }
            hideLoader();
        });
    </script>
    <script src="shared-navigation.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>
</body>

</html>
