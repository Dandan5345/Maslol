    // --- Component: Login ---
    function LoginScreen({ onLoginSuccess }) {
      const [loading, setLoading] = useState(false);
      const handleLogin = async () => {
        setLoading(true);
        try {
          await signInWithPopup(auth, googleProvider);
          onLoginSuccess();
        } catch (error) {
          console.error(error);
          alert('שגיאה בהתחברות. נסה שוב או בדוק הגדרות רשת/חסימת חלונות קופצים.');
        }
        setLoading(false);
      };

      return (
         <div className="flex-1 flex flex-col items-center justify-center p-6 bg-slate-50 dark:bg-darkbg text-center">
            <div className="bg-white dark:bg-darkcard p-10 rounded-[2rem] shadow-2xl max-w-md w-full border border-slate-100 dark:border-slate-800 relative overflow-hidden">
               <div className="absolute top-0 right-0 w-full h-2 bg-gradient-to-l from-blue-600 to-indigo-600"></div>
               <Activity size={56} className="text-blue-600 mx-auto mb-6" />

               <button 
                  onClick={handleLogin} 
                  disabled={loading}
                  className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 font-bold py-3.5 rounded-xl shadow-sm transition-all dark:bg-slate-800"
               >
                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-6 h-6" />

               </button>
               <p className="text-xs text-slate-400 dark:text-slate-500 mt-6">כל ההתקדמות שלך תישמר בענן.</p>
            </div>

      );
    }

    // --- Main App Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [currentScreen, setCurrentScreen] = useState('home'); // home, flashcards, practice, test
      const [cards, setCards] = useState(initialCards);
      const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');

      // Theme sync
      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDark]);

      // Auth Listener & DB Sync
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            try {
              const docRef = doc(db, 'users', currentUser.uid);
              const snap = await getDoc(docRef);
              if (snap.exists() && snap.data().cardsStatus) {
                const savedStatuses = snap.data().cardsStatus;
                setCards(initialCards.map(c => ({
                  ...c,
                  status: savedStatuses[c.id] || c.status
                })));
              }
            } catch (e) { console.error('Error fetching data:', e); }
          } else {
            setUser(null);
            setCards(initialCards); // reset
          }
          setLoadingAuth(false);
        });
        return unsubscribe;
      }, []);

      // Auto-save on card changes
      const saveCardsToDB = async (updatedCards) => {
        if (!user) return;
        setCards(updatedCards);
        try {
           const statusesMap = {};
           updatedCards.forEach(c => { if(c.status !== 'unseen') statusesMap[c.id] = c.status; });
           await setDoc(doc(db, 'users', user.uid), { cardsStatus: statusesMap }, { merge: true });
        } catch (e) { console.error("Save error", e); }
      };

      if (loadingAuth) {
         return <div className="flex-1 flex items-center justify-center dark:bg-darkbg"><div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>;
      }

      if (!user) {
         return <LoginScreen onLoginSuccess={() => {}} />;
      }

      return (
        <div className="h-full flex flex-col">
          {/* Header */}
          <header className="bg-white dark:bg-darkcard border-b border-slate-200 dark:border-slate-800 shadow-sm z-20 shrink-0">
             <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setCurrentScreen('home')}>
                   <div className="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2 rounded-xl text-white shadow-md group-hover:shadow-lg transition">
                      <Activity size={20} />
                   </div>
                   <div className="hidden sm:block">
                      <h1 className="text-sm font-black text-slate-800 dark:text-white leading-tight">קורס חובשים <span className="text-blue-600 dark:text-blue-400">החייאה</span></h1>
                   </div>
                </div>
                
                <div className="flex items-center gap-2 sm:gap-4">
                   <span className="text-sm font-bold text-slate-600 dark:text-slate-300 hidden sm:flex items-center gap-1 bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full">
                      <User size={14}/> שלום, {user.displayName?.split(' ')[0] || 'לוחם'}
                   </span>
                   {currentScreen !== 'home' && (
                      <button onClick={() => setCurrentScreen('home')} className="flex items-center gap-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 px-3 py-1.5 rounded-lg text-sm font-bold transition">
                        <Home size={16} /> <span className="hidden sm:inline">ראשי</span>
                      </button>
                   )}
                   <button onClick={() => setIsDark(!isDark)} className="p-2 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                      {isDark ? <Sun size={18} /> : <Moon size={18} />}
                   </button>
                   <button onClick={() => signOut(auth)} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition" title="התנתק">
                      <LogOut size={18} />
                   </button>
                </div>
             </div>
          </header>

          {/* Dynamic Screen */}
          <main className="flex-1 overflow-hidden relative w-full flex flex-col">
             {currentScreen === 'home' && <HomeScreen onNavigate={setCurrentScreen} cards={cards} />}
             {currentScreen === 'flashcards' && <FlashcardsScreen cards={cards} updateCards={saveCardsToDB} />}
             {currentScreen === 'practice' && <PracticeQuizScreen cards={cards} />}
             {currentScreen === 'test' && <TestQuizScreen cards={cards} onNavigate={setCurrentScreen} />}
          </main>
        </div>
      );
    }

                  </button>

                  <button onClick={() => onNavigate('test')} className="group bg-slate-900 dark:bg-slate-800 border border-slate-800 dark:border-slate-700 p-8 rounded-3xl shadow-lg hover:shadow-2xl hover:-translate-y-1 transition-all flex flex-col items-start text-right text-white">
                     <div className="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                        <Target size={32} className="text-indigo-300" />
                     </div>
                     <h3 className="text-2xl font-black mb-2">מבחן מסכם</h3>
                     <p className="text-slate-400 text-sm">בוחן פתע! 25 שאלות רנדומליות על ציון. בדוק מוכנות.</p>
                     <span className="mt-auto inline-flex items-center gap-1 text-slate-900 font-black bg-indigo-400 px-4 py-2 rounded-xl group-hover:bg-white transition-colors">התחל מבחן <ChevronLeft size={16} /></span>
                  </button>
               </div>
           </div>
        </div>
      );
    }

    // --- Component: Flashcards ---
    function FlashcardsScreen({ cards, updateCards }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [filterConfig, setFilterConfig] = useState({ hideKnown: false, specificIds: [] });
      const [showSettings, setShowSettings] = useState(false);
      
      const [dragX, setDragX] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const dragStartX = useRef(0);
      const hasMoved = useRef(false);

      const studyList = cards.filter(c => {
        if (filterConfig.hideKnown && c.status === 'known') return false;
        if (filterConfig.specificIds.length > 0 && !filterConfig.specificIds.includes(c.id)) return false;
        return true;
      });

      const currentCard = studyList[currentIndex] || null;

      const handleNext = () => {
        setFlipped(false);
        setTimeout(() => {
          if (currentIndex + 1 >= studyList.length) {
             const hasLearning = studyList.some(c => c.status === 'learning');
             if (hasLearning && !filterConfig.hideKnown) {
                setFilterConfig(p => ({ ...p, hideKnown: true }));
                setCurrentIndex(0);
                alert('סיימת סבב! עוברים לתרגל רק את הכרטיסיות שסימנת כדורשות חזרה.');
             } else {
                setCurrentIndex(0);
             }
          } else {
            setCurrentIndex(p => p + 1);
          }
        }, 150);
      };

      const markStatus = (status) => {
        if(!currentCard) return;
        const newCards = cards.map(c => c.id === currentCard.id ? { ...c, status } : c);
        updateCards(newCards);
        handleNext();
      };

      const handlePointerDown = (e) => {
        dragStartX.current = e.clientX;
        hasMoved.current = false;
        setIsDragging(true);
        e.target.setPointerCapture(e.pointerId);
      };
      const handlePointerMove = (e) => {
        if (!isDragging) return;
        const delta = e.clientX - dragStartX.current;
        if (Math.abs(delta) > 10) hasMoved.current = true;
        setDragX(delta);
      };
      const handlePointerUp = (e) => {
        if (!isDragging) return;
        setIsDragging(false);
        e.target.releasePointerCapture(e.pointerId);
        if (dragX > 100) markStatus('known');
        else if (dragX < -100) markStatus('learning');
        else if (!hasMoved.current) setFlipped(!flipped);
        setDragX(0); 
      };

      useEffect(() => {
        const handleKey = (e) => {
          if (showSettings || !currentCard) return;
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); setFlipped(f => !f); }
          if (e.key === 'ArrowRight') markStatus('known');
          if (e.key === 'ArrowLeft') markStatus('learning');
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      });

      const cardTransform = isDragging ? `translateX(${dragX}px) rotate(${dragX * 0.05}deg)` : 'translateX(0px) rotate(0deg)';
      let dragHintClass = '';
      let IconHint = null;
      if (dragX > 50) { dragHintClass = 'bg-green-50/50 dark:bg-green-900/20'; IconHint = <Check className="absolute right-10 text-green-500/30 w-32 h-32 pointer-events-none"/>; }
      else if (dragX < -50) { dragHintClass = 'bg-orange-50/50 dark:bg-orange-900/20'; IconHint = <X className="absolute left-10 text-orange-500/30 w-32 h-32 pointer-events-none"/>; }

      return (
        <div className={`flex-1 flex flex-col relative w-full items-center p-4 sm:p-6 transition-colors duration-300 overflow-hidden ${dragHintClass}`}>
           {IconHint}
           
           <div className="w-full max-w-lg flex justify-between items-center mb-6 z-10">
              <button onClick={() => setShowSettings(true)} className="bg-white dark:bg-darkcard text-slate-600 dark:text-slate-300 px-4 py-2 rounded-xl shadow border border-slate-200 dark:border-slate-700 font-bold text-sm flex items-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                 <Settings size={16} /> סינון
              </button>
              {studyList.length > 0 && (
                <div className="font-bold text-slate-500 dark:text-slate-400 text-sm px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-darkcard">
                   {currentIndex + 1} / {studyList.length}
                </div>
              )}
           </div>

           {studyList.length === 0 ? (
              <div className="bg-white dark:bg-darkcard rounded-3xl p-10 text-center shadow-lg border border-slate-100 dark:border-slate-800 max-w-lg w-full flex flex-col items-center z-10">
                 <div className="w-20 h-20 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center mb-6 text-green-600 dark:text-green-400"><Check size={40} /></div>
                 <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-2">אין כרטיסיות להצגה!</h2>
                 <p className="text-slate-500 dark:text-slate-400 mb-8 text-sm">כל הכרטיסיות סוננו החוצה. נקה סינונים כדי להמשיך.</p>
                 <button onClick={() => { setFilterConfig({hideKnown:false, specificIds:[]}); setCurrentIndex(0); }} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold w-full hover:bg-blue-700 transition">נקה והצג הכל</button>
              </div>
           ) : (
              <div className="max-w-lg w-full flex-1 flex flex-col items-center justify-center pb-10">
                 
                 <div 
                   className="z-10 w-full h-[380px] sm:h-[420px] cursor-grab active:cursor-grabbing no-select shrink-0 perspective-1000"
                   style={{ transform: cardTransform, transition: isDragging ? 'none' : 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)' }}
                   onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp} onPointerCancel={handlePointerUp}
                 >
                    <div className="relative w-full h-full transform-3d" style={{ transition: 'transform 0.5s ease-out', transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)'}}>
                       
                       {/* FRONT */}
                       <div className="absolute inset-0 backface-hidden bg-white dark:bg-darkcard rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 flex flex-col p-8 text-center justify-center items-center">
                          {currentCard.status === 'known' && <span className="absolute top-6 text-xs font-bold text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900/40 px-3 py-1 rounded-full">ידוע</span>}
                          {currentCard.status === 'learning' && <span className="absolute top-6 text-xs font-bold text-orange-700 dark:text-orange-400 bg-orange-100 dark:bg-orange-900/40 px-3 py-1 rounded-full">צריך חזרה</span>}
                          <Brain size={32} className="text-blue-500 dark:text-blue-400 mb-6 opacity-50" />
                          <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800 dark:text-white leading-tight">{currentCard.question}</h2>
                       </div>

                       {/* BACK */}
                       <div className="absolute inset-0 backface-hidden rotate-y-180 bg-gradient-to-br from-blue-50 to-white dark:from-slate-800 dark:to-darkcard rounded-3xl shadow-xl border border-blue-200 dark:border-slate-700 flex flex-col p-6 overflow-hidden">
                          <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col justify-center">
                             <h3 className="text-sm font-bold text-blue-600 dark:text-blue-400 mb-2 flex items-center gap-2"><Check size={16} /> תשובה:</h3>
                             <p className="text-xl font-bold text-slate-800 dark:text-white leading-snug mb-4">{currentCard.answer}</p>
                             <div className="bg-blue-100/50 dark:bg-blue-900/20 rounded-2xl p-4 mt-2">
                                <h3 className="text-xs font-black text-blue-800 dark:text-blue-300 mb-1.5 flex items-center gap-1.5 uppercase"><Info size={14} /> הסבר:</h3>
                                <p className="text-sm font-medium text-slate-700 dark:text-slate-300 leading-relaxed">{currentCard.explanation}</p>
                             </div>
                          </div>
                       </div>
                    </div>
                 </div>

                 <div className="flex w-full gap-4 mt-8 z-10 no-select">
                    <button onClick={(e) => { e.stopPropagation(); markStatus('learning'); }} className="flex-1 bg-white dark:bg-darkcard border-2 border-orange-100 dark:border-orange-900 text-orange-600 dark:text-orange-400 font-bold py-4 rounded-2xl shadow-sm flex flex-col items-center justify-center gap-1 hover:bg-orange-50 dark:hover:bg-slate-800 transition">
                       <X size={24} /> <span className="text-sm">צריך חזרה</span>
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); markStatus('known'); }} className="flex-1 bg-green-500 border-2 border-transparent text-white font-bold py-4 rounded-2xl shadow-lg flex flex-col items-center justify-center gap-1 hover:bg-green-600 transition">
                       <Check size={24} /> <span className="text-sm">יודע היטב</span>
                    </button>
                 </div>
              </div>
           )}

           {/* Settings Modal */}
           {showSettings && (
             <div className="absolute inset-0 z-50 flex items-center justify-center p-4">
                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowSettings(false)}></div>
                <div className="bg-white dark:bg-darkcard w-full max-w-md rounded-3xl shadow-2xl p-6 relative flex flex-col max-h-[85vh] border border-slate-200 dark:border-slate-700">
                   <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-black dark:text-white">הגדרות וסינון</h3>
                      <button onClick={() => setShowSettings(false)} className="bg-slate-100 dark:bg-slate-800 p-2 rounded-full text-slate-600 dark:text-slate-300"><X size={18}/></button>
                   </div>
                   
                   <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-1 pb-4">
                      <div className="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 flex items-center justify-between">
                         <div>
                            <h4 className="font-bold text-slate-800 dark:text-white">הסתר ידועות</h4>
                            <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">הצג רק מושגים שדורשים חזרה.</p>
                         </div>
                         <button onClick={() => { setFilterConfig(p => ({...p, hideKnown: !p.hideKnown})); setCurrentIndex(0); }} className={`w-12 h-6 flex items-center rounded-full p-1 transition-colors ${filterConfig.hideKnown ? 'bg-blue-500' : 'bg-slate-300 dark:bg-slate-600'}`}>
                            <div className={`bg-white w-4 h-4 rounded-full shadow transform transition-transform ${filterConfig.hideKnown ? 'translate-x-0' : '-translate-x-6'}`}></div>
                         </button>
                      </div>

                      <div className="bg-red-50 dark:bg-red-900/20 p-4 rounded-2xl border border-red-100 dark:border-red-900/50">
                         <h4 className="font-bold text-red-800 dark:text-red-400 mb-1">איפוס נתונים</h4>
                         <button onClick={() => {
                               if(window.confirm('לאפס את כל ההתקדמות לחלוטין?')) {
                                  updateCards(cards.map(c => ({...c, status: 'unseen'})));
                                  setFilterConfig({hideKnown: false, specificIds: []});
                                  setCurrentIndex(0); setShowSettings(false);
                               }
                            }}
                            className="bg-red-500 text-white font-bold py-2 px-4 rounded-xl text-sm flex items-center gap-2 mt-2 hover:bg-red-600 transition"
                         ><RotateCcw size={16} /> איפוס מלא</button>
                      </div>

                      <div>
                         <h4 className="font-bold text-slate-800 dark:text-white mb-2">בחירה חופשית:</h4>
                         <button onClick={() => setFilterConfig(p => ({...p, specificIds: []}))} className="text-xs font-bold text-blue-600 dark:text-blue-400 mb-3 hover:underline">נקה סינונים ספציפיים</button>
                         <div className="border border-slate-200 dark:border-slate-700 rounded-xl p-2 max-h-48 overflow-y-auto custom-scrollbar space-y-1 bg-slate-50 dark:bg-slate-800/50">
                            {cards.map(c => {
                               const isSel = filterConfig.specificIds.includes(c.id);
                               return (
                                  <div key={c.id} onClick={() => {
                                        setFilterConfig(p => ({...p, specificIds: p.specificIds.includes(c.id) ? p.specificIds.filter(id => id !== c.id) : [...p.specificIds, c.id]}));
                                        setCurrentIndex(0);
                                     }}
                                     className={`flex items-start gap-3 p-2 rounded-lg cursor-pointer text-sm border ${isSel ? 'bg-blue-100 dark:bg-blue-900/40 border-blue-200 dark:border-blue-800' : 'bg-white dark:bg-darkcard border-slate-100 dark:border-slate-700'}`}
                                  >
                                     <div className={`mt-0.5 w-4 h-4 rounded flex items-center justify-center border shrink-0 ${isSel ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white dark:bg-darkcard border-slate-300 dark:border-slate-600'}`}>
                                        {isSel && <Check size={12} />}
                                     </div>
                                     <span className="text-slate-700 dark:text-slate-300 leading-tight">{c.question}</span>
                                  </div>
                               );
                            })}
                         </div>
                      </div>
                   </div>
                </div>
             </div>
           )}
        </div>
      );
    }

    // --- Component: Practice ---
    function PracticeQuizScreen({ cards }) {
      const [qIndex, setQIndex] = useState(0);
      const [selectedOptions, setSelectedOptions] = useState([]);
      const [isChecked, setIsChecked] = useState(false);
      const [quizList] = useState(() => [...cards].sort(() => 0.5 - Math.random()));
      const q = quizList[qIndex];

      if (!q) return null;

      const handleOptionClick = (opt) => {
        if (isChecked) return;
        if (q.type === 'multiple') setSelectedOptions(p => p.includes(opt) ? p.filter(o => o !== opt) : [...p, opt]);
        else setSelectedOptions([opt]);
      };

      const handleCheck = () => {
        if (selectedOptions.length === 0) { alert('יש לבחור תשובה!'); return; }
        setIsChecked(true);
      };

      const isCorrectOption = (opt) => q.correctAnswers.includes(opt);
      const isFullyCorrect = selectedOptions.length === q.correctAnswers.length && selectedOptions.every(opt => isCorrectOption(opt));

      return (
         <div className="flex-1 overflow-y-auto custom-scrollbar p-4 flex justify-center">
            <div className="w-full max-w-2xl bg-white dark:bg-darkcard rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden my-auto max-h-full">
               
               <div className="p-6 bg-slate-800 dark:bg-slate-900 text-white relative">
                  <div className="flex justify-between items-center mb-3">
                     <span className="bg-white/20 text-xs font-bold px-3 py-1 rounded-full"><List size={12} className="inline mr-1"/> תרגול</span>
                     {q.type === 'multiple' && <span className="bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-pulse">רב-ברירה</span>}
                  </div>
                  <h2 className="text-2xl font-black leading-tight">{q.question}</h2>
               </div>

               <div className="p-6 space-y-3 flex-1 overflow-y-auto custom-scrollbar bg-slate-50 dark:bg-darkbg">
                  {q.options.map((opt, idx) => {
                     const isSelected = selectedOptions.includes(opt);
                     let style = "bg-white dark:bg-darkcard border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200";
                     let icon = <div className={`w-5 h-5 rounded shrink-0 border-2 ${q.type==='single'?'rounded-full':''} ${isSelected ? 'border-blue-600 bg-blue-600' : 'border-slate-300 dark:border-slate-600'}`}></div>;
                     
                     if (isChecked) {
                        style = "bg-white dark:bg-darkcard border-slate-200 dark:border-slate-700 opacity-60"; 
                        icon = <div className={`w-5 h-5 shrink-0`}></div>; 
                        if (isCorrectOption(opt)) {
                           style = "bg-green-50 dark:bg-green-900/20 border-green-500 text-green-900 dark:text-green-300";
                           icon = <Check className="text-green-600 dark:text-green-400 w-6 h-6 shrink-0" />;
                        } else if (isSelected && !isCorrectOption(opt)) {
                           style = "bg-red-50 dark:bg-red-900/20 border-red-400 text-red-900 dark:text-red-300";
                           icon = <X className="text-red-500 dark:text-red-400 w-6 h-6 shrink-0" />;
                        }
                     } else if (isSelected) {
                        style = "bg-blue-50 dark:bg-blue-900/20 border-blue-500 text-blue-900 dark:text-blue-300 shadow-sm";
                     }

                     return (
                        <div key={idx} onClick={() => handleOptionClick(opt)} className={`p-4 rounded-2xl border-2 flex items-center gap-4 transition-all cursor-pointer ${style}`}>
                           {icon}
                           <span className="font-bold text-lg leading-tight">{opt}</span>
                        </div>
                     );
                  })}
               </div>

               {isChecked ? (
                  <div className="p-6 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-darkcard">
                     <div className={`flex items-start gap-3 p-4 rounded-xl mb-4 ${isFullyCorrect ? 'bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300' : 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300'}`}>
                        {isFullyCorrect ? <Check size={24} className="shrink-0 mt-0.5" /> : <AlertCircle size={24} className="shrink-0 mt-0.5" />}
                        <div>
                           <h3 className="font-black mb-1">{isFullyCorrect ? 'תשובה נכונה!' : 'טעות.'}</h3>
                           <p className="text-sm font-medium leading-relaxed">{q.explanation}</p>
                        </div>
                     </div>
                     <button onClick={() => { setSelectedOptions([]); setIsChecked(false); setQIndex(p => (p + 1) % quizList.length); }} className="w-full bg-blue-600 text-white font-black py-3.5 rounded-xl hover:bg-blue-700 transition">השאלה הבאה</button>
                  </div>
               ) : (
                  <div className="p-6 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-darkcard">
                     <button onClick={handleCheck} className={`w-full font-black py-3.5 rounded-xl transition-all ${selectedOptions.length > 0 ? 'bg-slate-900 dark:bg-slate-700 text-white hover:bg-slate-800' : 'bg-slate-200 dark:bg-slate-800 text-slate-400 cursor-not-allowed'}`}>בדוק תשובה</button>
                  </div>
               )}
            </div>
         </div>
      );
    }

    // --- Component: Test ---
    function TestQuizScreen({ cards, onNavigate }) {
      const [testCards] = useState(() => [...cards].sort(() => 0.5 - Math.random()).slice(0, 25));
      const [answers, setAnswers] = useState({});
      const [currentIdx, setCurrentIdx] = useState(0);
      const [isFinished, setIsFinished] = useState(false);

      const q = testCards[currentIdx];
      const selectedOptions = answers[q?.id] || [];

      const handleOptionClick = (opt) => {
        if (isFinished) return;
        if (q.type === 'multiple') {
          const updated = selectedOptions.includes(opt) ? selectedOptions.filter(o => o !== opt) : [...selectedOptions, opt];
          setAnswers({...answers, [q.id]: updated});
        } else setAnswers({...answers, [q.id]: [opt]});
      };

      if (isFinished) {
         let correct = 0;
         testCards.forEach(c => {
            const a = answers[c.id] || [];
            if(a.length === c.correctAnswers.length && a.every(x => c.correctAnswers.includes(x))) correct++;
         });
         const percent = Math.round((correct/testCards.length)*100);
         let color = "text-green-500";
         if (percent < 70) color = "text-orange-500";
         if (percent < 50) color = "text-red-500";

         return (
            <div className="flex-1 overflow-y-auto p-4 flex items-center justify-center">
               <div className="bg-white dark:bg-darkcard max-w-lg w-full rounded-3xl shadow-2xl p-8 text-center border border-slate-200 dark:border-slate-800 relative">
                  <Target size={64} className={`mx-auto mb-4 ${color}`} />
                  <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-6">סיום המבחן!</h2>
                  
                  <div className="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-6 mb-8 border border-slate-100 dark:border-slate-700">
                     <div className="text-sm font-bold text-slate-500 dark:text-slate-400 mb-2">הציון שלך</div>
                     <div className={`text-6xl font-black ${color} mb-2`}>{percent}</div>
                     <div className="text-slate-600 dark:text-slate-300 font-bold">{correct} / {testCards.length}</div>
                  </div>

                  <div className="space-y-3">
                     <button onClick={() => onNavigate('home')} className="w-full bg-slate-900 dark:bg-slate-700 text-white font-black py-3.5 rounded-xl hover:bg-slate-800 transition">לתפריט הראשי</button>
                     <button onClick={() => { setAnswers({}); setCurrentIdx(0); setIsFinished(false); }} className="w-full bg-white dark:bg-darkcard text-slate-700 dark:text-slate-300 font-bold py-3.5 rounded-xl border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 transition">מבחן חדש</button>
                  </div>
               </div>
            </div>
         );
      }

      return (
        <div className="flex-1 w-full max-w-2xl mx-auto p-4 flex flex-col py-6 overflow-hidden">
            <div className="mb-4 flex items-center justify-between">
               <div className="font-bold text-slate-500 dark:text-slate-400">שאלה {currentIdx + 1} מתוך {testCards.length}</div>
               <div className="w-1/2 bg-slate-200 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden">
                  <div className="bg-indigo-600 h-full transition-all" style={{width: `${((currentIdx+1)/testCards.length)*100}%`}}></div>
               </div>
            </div>

            <div className="bg-white dark:bg-darkcard flex-1 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden">
               <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex-1 overflow-y-auto custom-scrollbar bg-slate-50 dark:bg-darkbg">
                  {q.type === 'multiple' && <span className="inline-flex bg-orange-100 dark:bg-orange-900/30 text-orange-800 dark:text-orange-400 text-xs font-bold px-3 py-1 rounded-full items-center gap-1.5 mb-4">רב-ברירה</span>}
                  <h2 className="text-2xl font-black leading-tight text-slate-800 dark:text-white mb-6">{q.question}</h2>

                  <div className="space-y-3">
                     {q.options.map((opt, idx) => {
                        const isSelected = selectedOptions.includes(opt);
                        let style = isSelected ? "bg-indigo-50 dark:bg-indigo-900/30 border-indigo-500 text-indigo-900 dark:text-indigo-300 shadow-sm" : "bg-white dark:bg-darkcard border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300";
                        let icon = <div className={`w-5 h-5 rounded shrink-0 border-2 ${q.type==='single'?'rounded-full':''} ${isSelected ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300 dark:border-slate-600'}`}></div>;
                        
                        return (
                           <div key={idx} onClick={() => handleOptionClick(opt)} className={`p-4 rounded-xl border-2 flex items-center gap-4 transition-all cursor-pointer ${style}`}>
                              {icon}
                              <span className="font-bold text-lg leading-tight">{opt}</span>
                           </div>
                        );
                     })}
                  </div>
               </div>

               <div className="p-4 bg-white dark:bg-darkcard shrink-0 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                  <button onClick={() => {if(currentIdx>0) setCurrentIdx(currentIdx-1)}} className={`font-bold px-4 py-2 rounded-lg transition ${currentIdx === 0 ? 'text-slate-300 dark:text-slate-600' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>קודמת</button>
                  <button onClick={() => {
                        if(selectedOptions.length===0 && !confirm('לא בחרת תשובה, להמשיך? (תשובה ריקה תיחשב כשגיאה)')) return;
                        if(currentIdx < testCards.length-1) setCurrentIdx(p=>p+1); else setIsFinished(true);
                     }} 
                     className="bg-indigo-600 text-white font-black px-6 py-3 rounded-xl hover:bg-indigo-700 shadow-lg flex items-center gap-2"
                  >
                     {currentIdx === testCards.length - 1 ? 'סיים מבחן' : 'השאלה הבאה'} <ChevronLeft size={18} />
                  </button>
               </div>
            </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
